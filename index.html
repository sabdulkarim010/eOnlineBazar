<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eOnlineBazar | Quality Meets Trust</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header id="main-header">
    <div class="header-top">
        <a href="#" class="logo">eOnlineBazar</a>
        <button class="cart-icon" onclick="showCheckout()">🛒<span class="cart-count" id="count">0</span></button>
    </div>
</header>

<nav class="nav-links">
    <a href="#grocery">🍏 Grocery</a>
    <a href="#electronics">🔌 Electronics</a>
    <a href="#cosmetics">💄 Cosmetics</a>
    <a href="#kids">🧸 Kids</a>
</nav>

<div id="product-sections"></div>

<div id="order-section" style="display:none;">
    <div class="cart-view" id="cart-area">
        <h3 style="text-align: center;">🛒 Your Shopping Cart</h3>
        <table>
            <thead><tr><th>Item</th><th>Qty</th><th>Price</th></tr></thead>
            <tbody id="cart-items"></tbody>
        </table>
        <h3 style="text-align: right; padding: 15px;">Total: ৳ <span id="total-price">0</span></h3>
    </div>

    <div class="cart-view">
        <h3>📍 Checkout Information</h3>
        <div class="input-box">
            <label>Full Name *</label>
            <input type="text" id="custName" placeholder="Enter your name">
        </div>
        <div class="input-box">
            <label>Mobile Number *</label>
            <input type="tel" id="custPhone" placeholder="01XXXXXXXXX">
        </div>
        <div class="input-box">
            <label>Address *</label>
            <textarea id="custAddr" rows="3" placeholder="Full Address"></textarea>
        </div>
        <div class="input-box">
            <label>Payment Method</label>
            <select id="payMethod">
                <option value="cod">Cash on Delivery</option>
                <option value="bkash">Bkash (01XXXXXXXXX)</option>
            </select>
        </div>
        <button class="confirm-btn" onclick="confirmFinalOrder()">Confirm Order Now</button>
    </div>
</div>

<div id="toast"></div>
<footer><p>&copy; 2026 eOnlineBazar | Developed by Abdul Karim Sheikh</p></footer>

<script src="script.js"></script>
</body>
</html>
