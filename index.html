<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eOnlineBazar | Your Trusted Marketplace</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="toast" class="toast-top"></div>

    <header>
        <div class="container">
            <div class="top-bar">
                <div class="logo-area">
                    <h1 class="main-logo">eOnlineBazar</h1>
                </div>
                <div class="cart-area" onclick="toggleCart()">
                    <div class="cart-wrapper">
                        <span class="cart-icon">🛒</span>
                        <span id="cart-count">0</span>
                    </div>
                </div>
            </div>
            
            <div class="search-container">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search products..." onkeyup="searchProduct()">
                    <button class="search-btn">🔍</button>
                </div>
            </div>
        </div>
    </header>

    <nav class="category-nav">
        <div class="container cat-flex">
            <button class="cat-btn active" onclick="filterCategory('all')">All</button>
            <button class="cat-btn" onclick="filterCategory('grocery')">Grocery</button>
            <button class="cat-btn" onclick="filterCategory('electronics')">Electronics</button>
            <button class="cat-btn" onclick="filterCategory('cosmetics')">Cosmetics</button>
            <button class="cat-btn" onclick="filterCategory('kids')">Kids Care</button>
        </div>
    </nav>

    <main class="container">
        <div id="product-grid" class="product-grid"></div>
    </main>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <div id="cartModal" class="modal">
        <div class="modal-content cart-content">
            <span class="close-modal" onclick="toggleCart()">&times;</span>
            <h2 class="cart-title" style="margin-bottom: 20px; text-align: center; border-bottom: 2px solid #f85606; padding-bottom: 10px;">Your Shopping Cart</h2>
            
            <div id="cart-items-container"></div>
            
            <div id="order-form-container" class="order-form">
                <h3 style="margin: 25px 0 15px; color: #232f3e; font-size: 18px;">Shipping Address</h3>
                
                <div class="input-group">
                    <label>Full Name <span class="required" style="color:red;">*</span></label>
                    <input type="text" id="orderName" placeholder="Enter full name">
                    <span id="nameError" class="error-text"></span> </div>
                
                <div class="input-group">
                    <label>Mobile Number <span class="required" style="color:red;">*</span></label>
                    <input type="tel" id="orderPhone" placeholder="01XXXXXXXXX" maxlength="11" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    <span id="phoneError" class="error-text"></span>
                </div>
                
                <div class="input-group">
                    <label>Full Address <span class="required" style="color:red;">*</span></label>
                    <textarea id="orderAddress" placeholder="Village/House, Road, Area, District" rows="3"></textarea>
                    <span id="addressError" class="error-text"></span>
                </div>

                <div class="input-group">
                    <label>Payment Method <span class="required" style="color:red;">*</span></label>
                    <select id="paymentMethod">
                        <option value="" disabled selected>-- Select Method --</option>
                        <option value="Cash on delivery">Cash on delivery</option>
                        <option value="Bkash Payment">Bkash Payment</option>
                        <option value="Nagad Payment">Nagad Payment</option>
                    </select>
                    <span id="paymentError" class="error-text"></span>
                </div>
                
                <div class="total-section" style="background: #f9f9f9; padding: 20px; border-radius: 10px; margin-top: 20px; border: 1px solid #eee;">
                    <h4 style="font-size: 20px; margin-bottom: 15px; display: flex; justify-content: space-between;">
                        <span>Total Bill:</span> <span>৳ <span id="cart-total">0</span></span>
                    </h4>
                    <button class="confirm-btn" style="height: 55px; font-size: 18px;" onclick="validateAndOrder()">Confirm Order</button>
                </div>
            </div>
        </div>
    </div>

    <div id="confirmBox" class="success-box" style="display:none; border-top: 6px solid #f85606;">
        <div class="success-content">
            <h3 style="color:#232f3e; margin-bottom:15px;">Review Your Order</h3>
            <p style="font-size:15px; margin-bottom:25px; color:#555;">Please make sure your phone number and address are correct before proceeding.</p>
            <div style="display:flex; gap:10px;">
                <button class="confirm-btn" style="background:#666; margin:0; flex:1;" onclick="closeConfirm()">Edit</button>
                <button class="confirm-btn" style="margin:0; flex:1.5;" onclick="finalOrderProcess()">Confirm Now</button>
            </div>
        </div>
    </div>

    <div id="successBox" class="success-box" style="display:none;">
        <div class="success-content" id="successMessage"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
