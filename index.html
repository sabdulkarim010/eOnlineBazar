<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eOnlineBazar | Premium Shopping</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="container header-content">
        <a href="#" class="logo">eOnlineBazar</a>
        <div class="cart-box" onclick="showCheckout()">
            <span class="cart-icon">🛒</span>
            <span id="count">0</span>
        </div>
    </div>
</header>

<div class="search-area">
    <div class="container">
        <div class="search-box">
            <input type="text" placeholder="Search products...">
            <button>Search</button>
        </div>
        <div class="category-scroll">
            <button class="cat-btn active" onclick="filterCat('all')">🏠 Home</button>
            <button class="cat-btn" onclick="filterCat('grocery')">🍏 Grocery</button>
            <button class="cat-btn" onclick="filterCat('electronics')">🔌 Electronics</button>
        </div>
    </div>
</div>

<section class="coming-soon-banner">
    <div class="container">
        <h1>Coming Soon: A Revolution in Shopping!</h1>
        <p>আমরা নিয়ে আসছি আপনার পছন্দের স্বপ্নের অনলাইন মার্কেটপ্লেস। প্রতিটি পণ্য হবে বাছাইকৃত এবং প্রিমিয়াম কোয়ালিটির।</p>
        <div class="loading-bar-container"><div class="loading-bar"></div></div>
    </div>
</section>

<main class="container">
    <h2 class="section-title">আমাদের পণ্যসমূহ</h2>
    <div id="product-list" class="product-grid">
        </div>
</main>

<div id="productModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div id="modal-data"></div>
    </div>
</div>

<div id="checkout-section" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeCheckout()">&times;</span>
        <h2>🛒 আপনার শপিং কার্ট</h2>
        <div id="cart-items"></div>
        <p class="total-price">Total: ৳ <span id="total-amount">0</span></p>
        <div class="order-form">
            <input type="text" id="custName" placeholder="আপনার নাম">
            <input type="tel" id="custPhone" placeholder="মোবাইল নাম্বার">
            <textarea id="custAddr" placeholder="আপনার ঠিকানা"></textarea>
            <button class="order-btn" onclick="placeOrder()">অর্ডার করুন</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
