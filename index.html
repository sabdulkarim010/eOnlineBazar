<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eOnlineBazar | Your Trusted Marketplace</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="toast" class="toast-top"></div>

    <header>
        <div class="container">
            <div class="top-bar">
                <div class="logo-area">
                    <h1 class="main-logo">eOnlineBazar</h1>
                </div>
                <div class="cart-area" onclick="toggleCart()">
                    <div class="cart-wrapper">
                        <span class="cart-icon">🛒</span>
                        <span id="cart-count">0</span>
                    </div>
                </div>
            </div>
            
            <div class="search-container">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search for product..." onkeyup="searchProduct()">
                    <button class="search-btn">🔍</button>
                </div>
            </div>
        </div>
    </header>

    <nav class="category-nav">
        <div class="container cat-flex">
            <button class="cat-btn active" onclick="filterCategory('all')">All</button>
            <button class="cat-btn" onclick="filterCategory('grocery')">Grocery</button>
            <button class="cat-btn" onclick="filterCategory('electronics')">Electronics</button>
            <button class="cat-btn" onclick="filterCategory('cosmetics')">Cosmetics</button>
            <button class="cat-btn" onclick="filterCategory('kids')">Kids Care</button>
        </div>
    </nav>

    <div class="container">
        <div class="coming-soon-banner">
            <div class="banner-content">
                <h2>Coming Soon: A Revolution in Shopping!</h2>
                <p>আমরা নিয়ে আসছি আপনার পছন্দের স্বপ্নের অনলাইন মার্কেটপ্লেস। ওয়েবসাইট ডেভেলপমেন্ট এর কাজ চলছে...</p>
                <div class="progress-container">
                    <div class="progress-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <main class="container">
        <div id="product-grid" class="product-grid">
            </div>
    </main>

    <div id="productModal" class="modal">
        <div class="modal-content temu-style">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modal-body">
                </div>
        </div>
    </div>

    <div id="cartModal" class="modal">
        <div class="modal-content cart-content">
            <span class="close-modal" onclick="toggleCart()">&times;</span>
            <h2 class="cart-title">Your Shopping Cart</h2>
            
            <div id="cart-items-container"></div>
            
            <div id="order-form-container" class="order-form">
                <hr style="margin: 20px 0;">
                <h3>Shipping Address</h3>
                
                <div class="input-group">
                    <label>Name <span class="required">*</span></label>
                    <input type="text" id="orderName" placeholder="Enter full name">
                </div>
                
                <div class="input-group">
                    <label>Mobile Number <span class="required">*</span></label>
                    <input type="tel" id="orderPhone" placeholder="01XXXXXXXXX" maxlength="11">
                </div>
                
                <div class="input-group">
                    <label>Full Address <span class="required">*</span></label>
                    <textarea id="orderAddress" placeholder="Village/House, Road, Area"></textarea>
                </div>
                
                <div class="input-group">
                    <label>Extra Note (Optional)</label>
                    <input type="text" id="orderNote" placeholder="Anything we should know?">
                </div>
                
                <div class="input-group">
                    <label>Payment Method <span class="required">*</span></label>
                    <select id="paymentMethod">
                        <option value="" disabled selected>-- Select Payment Method --</option>
                        <option value="Cash on delivery">Cash on delivery</option>
                        <option value="Bkash Payment">Bkash Payment</option>
                        <option value="Nagad Payment">Nagad Payment</option>
                    </select>
                </div>
                
                <div class="total-section">
                    <h4>Total Bill: ৳ <span id="cart-total">0</span></h4>
                    <button class="confirm-btn" onclick="validateAndOrder()">Confirm Order</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
