<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eOnlineBazar | Online Shopping</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-top">
        <a href="#" class="logo">eOnlineBazar</a>
        <div class="cart-icon" onclick="showCheckout()">🛒<span id="count">0</span></div>
    </div>
</header>

<div id="product-sections"></div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="modal-body">
            </div>
    </div>
</div>

<div id="order-section" class="cart-view" style="display:none;">
    <h3 style="text-align:center; border-bottom:1px solid #ddd; padding-bottom:10px;">🛒 Shopping Cart</h3>
    <div id="cart-items-list" style="margin:15px 0;"></div>
    <div class="total-bar">Total: ৳ <span id="total-price">0</span></div>
    
    <div class="checkout-form">
        <h3>📍 Delivery Information</h3>
        <input type="text" id="custName" placeholder="আপনার নাম">
        <input type="tel" id="custPhone" placeholder="মোবাইল নাম্বার">
        <textarea id="custAddr" placeholder="পুরো ঠিকানা (গ্রাম, থানা, জেলা)"></textarea>
        <select id="payMethod">
            <option value="cod">Cash on Delivery</option>
            <option value="bkash">Bkash (পেমেন্ট: 0510870648)</option>
        </select>
        <button class="confirm-btn" onclick="confirmFinalOrder()">Confirm Order</button>
    </div>
</div>

<div id="toast"></div>

<footer>
    <p>&copy; 2026 eOnlineBazar | Developed by Abdul Karim Sheikh</p>
</footer>

<script src="script.js"></script>
</body>
</html>
